services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — single instance, two databases
  #   lenovosales       → Lenovo-Backend (D365 CRM)
  #   lenovo_aibackend  → Lenovo-AIBackend (meeting intelligence)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       lenovosales
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-9432}:5432"

  # ---------------------------------------------------------------------------
  # Lenovo-Backend — D365 CRM data layer (port 9100)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./Lenovo-Backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_HOST:     postgres
      DATABASE_PORT:     5432
      DATABASE_NAME:     lenovosales
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSLMODE:  ${DATABASE_SSLMODE:-}
      CORS_ORIGINS:      ${CORS_ORIGINS:-http://localhost}
      FISCAL_YEAR_START_MONTH: ${FISCAL_YEAR_START_MONTH:-4}
    ports:
      - "9100:9100"

  # ---------------------------------------------------------------------------
  # Lenovo-AIBackend — meeting intelligence / note-taking agent (port 9101)
  # ---------------------------------------------------------------------------
  aibackend:
    build:
      context: ./Lenovo-AIBackend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     lenovosales
      DB_USER:     ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      D365_BASE_URL:          http://backend:9100
      D365_TIMEOUT_SECONDS:   ${D365_TIMEOUT_SECONDS:-5.0}

      AIBACKEND_API_PREFIX:   /ai-api
      SYSTEM_EMAIL_ADDRESS:   ${SYSTEM_EMAIL_ADDRESS:-sales-assistant@lenovo.com}
      CONSENT_WINDOW_MINUTES: ${CONSENT_WINDOW_MINUTES:-60}
      INTERNAL_EMAIL_DOMAINS: ${INTERNAL_EMAIL_DOMAINS:-lenovo.com,motorola.com}
      OPT_OUT_BASE_URL:       ${PUBLIC_AIBACKEND_URL:-http://localhost:9101}
      CONSENT_RETRY_DELAY_MINUTES: ${CONSENT_RETRY_DELAY_MINUTES:-10}

      DATA_TASK_STALE_DAYS:        ${DATA_TASK_STALE_DAYS:-30}
      DATA_TASK_SCAN_PAGE_SIZE:    ${DATA_TASK_SCAN_PAGE_SIZE:-100}
      DATA_TASK_DEFAULT_SEVERITY:  ${DATA_TASK_DEFAULT_SEVERITY:-medium}

      # Microsoft Graph (Teams meeting creation)
      TENANT_ID:        ${TENANT_ID}
      CLIENT_ID:        ${CLIENT_ID}
      CLIENT_SECRET:    ${CLIENT_SECRET}
      USER_ID:          ${AIBACKEND_USER_ID}
      GRAPH_VERIFY_SSL: ${GRAPH_VERIFY_SSL:-true}

      # Vexa bot integration
      VEXA_BOT_URL:           ${VEXA_BOT_URL}
      VEXA_API_KEY:           ${VEXA_API_KEY}
      VEXA_CALLBACK_BASE_URL: http://172.22.0.1:9101
    ports:
      - "9101:9101"

  # ---------------------------------------------------------------------------
  # LenovoD365-SalesAI — multi-agent orchestrator (port 9091)
  # ---------------------------------------------------------------------------
  orchestrator:
    build:
      context: ./LenovoD365-SalesAI
    restart: unless-stopped
    environment:
      AZURE_OPENAI_ENDPOINT:   ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_KEY:    ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_MODEL:      ${AZURE_OPENAI_MODEL:-gpt-4o}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}

      TENANT_ID:      ${TENANT_ID}
      CLIENT_ID:      ${CLIENT_ID}
      CLIENT_SECRET:  ${CLIENT_SECRET}
      USER_ID:        ${ORCHESTRATOR_USER_ID}
      USER_EMAIL:     ${ORCHESTRATOR_USER_EMAIL}
      RECIPIENT_EMAIL: ${RECIPIENT_EMAIL}
      GRAPH_VERIFY_SSL: ${GRAPH_VERIFY_SSL:-true}
      AIBACKEND_BASE_URL: http://aibackend:9101
      BACKEND_BASE_URL:   http://backend:9100
    ports:
      - "9091:9091"

  # ---------------------------------------------------------------------------
  # Lenevo-Frontend — React SPA served by Nginx (port 80)
  # Nginx proxies /api/ → backend, /ai-api/ → aibackend, /v1/orchestrator/ → orchestrator
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./Lenevo-Frontend
    restart: unless-stopped
    depends_on:
      - backend
      - aibackend
      - orchestrator
    ports:
      - "${FRONTEND_PORT:-9080}:80"

volumes:
  pg_data:
