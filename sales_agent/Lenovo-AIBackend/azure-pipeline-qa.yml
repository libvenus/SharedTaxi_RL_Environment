trigger:
- none

pool:
  name: QA

steps:
- checkout: self

# Stop existing AI container
- script: |
    echo "Stopping existing AI backend container..."
    docker stop lenovo-ai-backend-qa || true
    docker rm lenovo-ai-backend-qa || true
  displayName: 'Stop Existing Container'

# Build Docker image
- script: |
    echo "Building AI backend image..."
    docker build --no-cache -t lenovo-aibackend-qa:$(Build.BuildId) .
  displayName: 'Build Docker Image'

# Verify image
- script: |
    docker images | grep lenovo-aibackend-qa
  displayName: 'Verify Docker Image'

# Deploy container
- script: |
    echo "Starting AI backend container..."

    docker run -d \
      --name lenovo-ai-backend-qa \
      --restart unless-stopped \
      --network lenovo-net \
      --env-file .env \
      -p 9101:9101 \
      lenovo-aibackend-qa:$(Build.BuildId)
  displayName: 'Deploy Container'

# Verify deployment
- script: |
    docker ps

    echo "===== AI BACKEND LOGS ====="
    docker logs lenovo-ai-backend-qa --tail 50
  displayName: 'Verify Deployment'
