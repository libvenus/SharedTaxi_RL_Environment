server {
    listen 443 ssl;
    server_name D365xiQ-test.sutherlandglobal.com;

    ssl_certificate     /etc/nginx/ssl/sutherlandglobal.com.pem;
    ssl_certificate_key /etc/nginx/ssl/sutherlandglobal.com.key;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Equivalent of Vite proxy
    location /api/ {
        proxy_pass http://lenovo-aibackend:9100;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location /ai-api/ {

    proxy_pass http://lenovo-aibackend:9100;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
}
location /v1/orchestrator/ {
    proxy_pass http://172.17.0.1:8002;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

}

