trigger:
- development

pool:
  name: Dev

steps:

- checkout: self

- script: |
    docker build -t lenovo-d365-salesai:$(Build.BuildId) .
  displayName: Build Docker Image

- script: |
    docker stop lenovo-d365-salesai || true
    docker rm lenovo-d365-salesai || true
  displayName: Remove Existing Container

- script: |
    docker run -d \
      --name lenovo-d365-salesai \
      --restart unless-stopped \
      -p 9091:9091 \
      lenovo-d365-salesai:$(Build.BuildId)
  displayName: Start Container
- script: |
    echo "Deploying Email API..."

    docker stop email-api || true
    docker rm email-api || true

    docker run -d \
      --name email-api \
      --restart unless-stopped \
      -p 8003:8003 \
      lenovo-d365-salesai:$(Build.BuildId) \
      uvicorn api.email_api:app --host 0.0.0.0 --port 8003
  displayName: 'Deploy Email API'
- script: |
    echo "Deploying Summary API..."

    docker stop summary-api || true
    docker rm summary-api || true

    docker run -d \
      --name summary-api \
      --restart unless-stopped \
      -p 8004:8004 \
      lenovo-d365-salesai:$(Build.BuildId) \
      uvicorn api.sum_api.summary_api:app --host 0.0.0.0 --port 8004
  displayName: 'Deploy Summary API'

- script: |
    echo "Deploying Sales Intel API..."

    docker stop sales-intel-api || true
    docker rm sales-intel-api || true

    docker run -d \
      --name sales-intel-api \
      --restart unless-stopped \
      -p 8005:8005 \
      lenovo-d365-salesai:$(Build.BuildId) \
      uvicorn api.sales_intel_api:app --host 0.0.0.0 --port 8005
  displayName: 'Deploy Sales Intel API'

- script: |
    echo "Deploying Refine API..."

    docker stop refine-api || true
    docker rm refine-api || true

    docker run -d \
      --name refine-api \
      --restart unless-stopped \
      -p 8006:8006 \
      lenovo-d365-salesai:$(Build.BuildId) \
      uvicorn api.refine_api.refine_api:app --host 0.0.0.0 --port 8006
  displayName: 'Deploy Refine API'

- script: |
    echo "Verifying containers..."
    docker ps
  displayName: 'Verify Deployment'


