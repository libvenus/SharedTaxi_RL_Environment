server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so upstream names are resolved at request time,
    # not at startup — prevents nginx from crashing if a service is temporarily down.
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lenovo-Backend (D365 CRM data layer)
    location /api/ {
        set $backend_upstream http://backend:9100;
        proxy_pass $backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Lenovo-AIBackend (Note-Taking / meeting intelligence)
    location /ai-api/ {
        set $aibackend_upstream http://aibackend:9101;
        proxy_pass $aibackend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # LenovoD365-SalesAI (multi-agent orchestrator chat)
    location /v1/orchestrator/ {
        set $orchestrator_upstream http://orchestrator:9091;
        proxy_pass $orchestrator_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
